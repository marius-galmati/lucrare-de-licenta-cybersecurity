# Development docker-compose — no Nginx, all ports exposed
# Usage: docker-compose -f docker-compose.dev.yml up

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyberxscore
      POSTGRES_USER: cyberxscore
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cyberxscore_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberxscore"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cyberxscore:${DB_PASSWORD:-cyberxscore_dev}@db:5432/cyberxscore?schema=public
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      ANONYMOUS_JWT_SECRET: ${ANONYMOUS_JWT_SECRET:-dev-anon-secret-change-me}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-admin@example.com}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/questions || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    restart: unless-stopped
    depends_on: [api]
    environment:
      INTERNAL_API_URL: http://api:3001/api
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
